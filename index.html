<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClass</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FAF8F4;--white:#fff;--ink:#1C1C1E;--ink2:#48484A;--ink3:#8E8E93;
  --border:#E5E3DF;--peach:#F2A96A;
  --r-sm:10px;--r-md:16px;--r-lg:24px;
  --sh-sm:0 1px 8px rgba(0,0,0,.06);--sh-md:0 4px 24px rgba(0,0,0,.09);--sh-lg:0 12px 48px rgba(0,0,0,.14);
  --sw:240px;--th:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit','Noto Sans KR',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
input,textarea,select,button{font-family:'Outfit','Noto Sans KR',sans-serif;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:2000;transition:opacity .3s;}
#loading.hide{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#fff;}
.loading-logo span{color:var(--peach);}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--ink);display:none;align-items:center;justify-content:center;z-index:999;}
#auth.on{display:flex;}
.auth-box{background:var(--white);border-radius:var(--r-lg);padding:44px 40px;width:100%;max-width:400px;box-shadow:var(--sh-lg);}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;margin-bottom:6px;}
.auth-logo span{color:var(--peach);}
.auth-sub{font-size:13px;color:var(--ink3);margin-bottom:28px;font-family:'Noto Sans KR',sans-serif;}
.auth-tabs{display:flex;background:var(--cream);border-radius:var(--r-sm);padding:4px;margin-bottom:24px;gap:4px;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);border-radius:8px;cursor:pointer;transition:.2s;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;}
.auth-tab.on{background:var(--white);color:var(--ink);font-weight:600;box-shadow:var(--sh-sm);}
.f{margin-bottom:14px;}
.f label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:6px;font-family:'Noto Sans KR',sans-serif;}
.f input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--ink);outline:none;background:var(--cream);transition:.2s;}
.f input:focus{border-color:var(--ink2);background:var(--white);}
.btn-blk{width:100%;padding:13px;background:var(--ink);color:var(--white);border:none;border-radius:var(--r-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.btn-blk:hover{background:#333;}
.btn-blk:disabled{background:#999;cursor:not-allowed;}
.auth-msg{font-size:12px;margin-top:8px;text-align:center;min-height:16px;font-family:'Noto Sans KR',sans-serif;}
.auth-msg.err{color:#e44;}
.auth-msg.ok{color:#2a2;}

/* LAYOUT */
#app{display:none;}
#app.on{display:flex;}
.sidebar{width:var(--sw);background:var(--white);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;transition:.3s;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
.sb-logo h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.sb-logo h1 span{color:var(--peach);}
.sb-logo p{font-size:11px;color:var(--ink3);margin-top:3px;font-family:'Noto Sans KR',sans-serif;}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);padding:8px 12px 5px;font-family:'Noto Sans KR',sans-serif;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:2px;font-size:14px;font-weight:500;color:var(--ink2);border:none;background:transparent;width:100%;text-align:left;transition:.15s;}
.ni:hover{background:var(--cream);}
.ni.on{background:var(--ink);color:var(--white);}
.ni svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
.sb-divider{height:1px;background:var(--border);margin:8px 12px;}
.sb-user{padding:14px;border-top:1px solid var(--border);}
.sb-user-row{display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--peach);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--white);flex-shrink:0;overflow:hidden;font-family:'Noto Sans KR',sans-serif;}
.sb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sb-uinfo{flex:1;min-width:0;}
.sb-uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Noto Sans KR',sans-serif;}
.sb-urole{font-size:11px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}
.btn-logout{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--ink3);}
.btn-logout:hover{color:#e44;}
.btn-logout svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.main{margin-left:var(--sw);flex:1;min-height:100vh;}
.topbar{height:var(--th);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px;position:sticky;top:0;z-index:40;}
.topbar h2{flex:1;font-size:18px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.topbar h2.serif{font-family:'Cormorant Garamond',serif;font-size:24px;}
.topbar-actions{display:flex;gap:8px;}
.pb{padding:28px;}
.btn-p{padding:9px 16px;background:var(--ink);color:var(--white);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.btn-p:hover{background:#333;}
.btn-p svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;}
.btn-s{padding:9px 14px;background:transparent;color:var(--ink);border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.btn-s:hover{border-color:var(--ink2);}

/* CLASSES */
.search-bar{position:relative;max-width:300px;margin-bottom:24px;}
.search-bar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;stroke:var(--ink3);fill:none;stroke-width:2;}
.search-bar input{width:100%;padding:10px 12px 10px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;outline:none;background:var(--white);font-family:'Noto Sans KR',sans-serif;}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
.fc{border-radius:var(--r-md);cursor:pointer;position:relative;overflow:hidden;aspect-ratio:4/3;transition:transform .2s,box-shadow .2s;box-shadow:var(--sh-sm);}
.fc:hover{transform:translateY(-3px);box-shadow:var(--sh-md);}
.fc-tab{position:absolute;top:0;right:22px;width:48px;height:15px;border-radius:7px 7px 0 0;}
.fc-body{position:absolute;inset:11px 0 0;border-radius:13px;border:2px solid rgba(0,0,0,.07);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
.fc-label{background:rgba(255,255,255,.6);backdrop-filter:blur(6px);border:1.5px solid rgba(0,0,0,.07);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;display:inline-block;font-family:'Noto Sans KR',sans-serif;}
.fc-meta{font-size:11px;color:rgba(0,0,0,.45);margin-top:4px;font-family:'Noto Sans KR',sans-serif;}
.fc-edit{position:absolute;top:18px;right:8px;opacity:0;transition:.2s;}
.fc:hover .fc-edit{opacity:1;}
.ic-btn{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.75);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ic-btn svg{width:12px;stroke:var(--ink);fill:none;stroke-width:2;}
.empty{text-align:center;padding:70px 20px;color:var(--ink3);}
.empty .ei{font-size:48px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.7;font-family:'Noto Sans KR',sans-serif;}

/* DETAIL */
.d-hero{height:145px;position:relative;display:flex;align-items:flex-end;padding:20px 28px;}
.d-hero .back{position:absolute;top:18px;left:20px;background:rgba(255,255,255,.7);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.d-hero .back svg{width:16px;stroke:var(--ink);fill:none;stroke-width:2;}
.d-hero h1{font-size:26px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.d-meta{display:flex;gap:20px;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap;}
.d-chip{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink2);font-family:'Noto Sans KR',sans-serif;}
.d-chip svg{width:14px;stroke:var(--ink3);fill:none;stroke-width:1.8;}
.d-tabbar{background:var(--white);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding-right:20px;}
.d-tabs{display:flex;padding:0 28px;}
.dt{padding:13px 14px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2.5px solid transparent;transition:.2s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.dt.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600;}
.d-body{padding:24px 28px;}
.ov-card{background:var(--white);border-radius:var(--r-md);padding:18px;border:1px solid var(--border);margin-bottom:12px;}
.ov-card h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;}
.ov-card textarea{width:100%;border:none;outline:none;font-size:14px;line-height:1.8;color:var(--ink);resize:none;background:transparent;min-height:72px;font-family:'Noto Sans KR',sans-serif;}
.save-row{display:flex;justify-content:flex-end;margin-top:6px;}
.todo-row{display:flex;align-items:center;gap:11px;padding:12px 15px;background:var(--white);border-radius:var(--r-sm);margin-bottom:7px;border:1px solid var(--border);}
.check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;}
.check.done{background:var(--ink);border-color:var(--ink);}
.check.done::after{content:'';width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.todo-txt{flex:1;font-size:14px;font-family:'Noto Sans KR',sans-serif;}
.todo-txt.done{text-decoration:line-through;color:var(--ink3);}
.del-btn{background:none;border:none;cursor:pointer;padding:3px;color:var(--ink3);opacity:0;transition:.2s;}
.todo-row:hover .del-btn{opacity:1;}
.del-btn svg{width:13px;stroke:currentColor;fill:none;stroke-width:2;}
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:var(--r-md);padding:28px;cursor:pointer;transition:.2s;background:var(--white);text-align:center;margin-bottom:14px;}
.upload-zone:hover{border-color:var(--ink2);background:var(--cream);}
.upload-zone svg{width:32px;height:32px;stroke:var(--ink3);fill:none;stroke-width:1.5;margin-bottom:8px;}
.upload-zone p{font-size:13px;color:var(--ink2);font-family:'Noto Sans KR',sans-serif;}
.upload-zone small{font-size:11px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}
.file-row{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--white);border-radius:var(--r-sm);margin-bottom:7px;border:1px solid var(--border);}
.file-icon{width:36px;height:36px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-info .fn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Noto Sans KR',sans-serif;}
.file-info .fs{font-size:11px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}

/* CALENDAR */
.cal-wrap{display:grid;grid-template-columns:1fr 290px;gap:22px;}
.cal-box{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:22px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.cal-nav{display:flex;gap:5px;}
.cal-nav button{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-nav button svg{width:13px;stroke:var(--ink);fill:none;stroke-width:2;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
.cal-dow span{text-align:center;font-size:11px;font-weight:600;color:var(--ink3);padding:5px 0;font-family:'Noto Sans KR',sans-serif;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{min-height:68px;border-radius:var(--r-sm);padding:5px;cursor:pointer;transition:.15s;border:1.5px solid transparent;}
.cal-cell:hover{background:var(--cream);}
.cal-cell.other .dn{color:#ccc;}
.cal-cell.today .dn{background:var(--ink);color:var(--white);border-radius:50%;}
.cal-cell.sel{border-color:#999;background:#F5F3EF;}
.dn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border-radius:50%;margin-bottom:3px;font-family:'Noto Sans KR',sans-serif;}
.dots{display:flex;flex-wrap:wrap;gap:2px;}
.dot{height:4px;border-radius:2px;flex-shrink:0;}
.cal-side{display:flex;flex-direction:column;gap:12px;}
.cal-sb{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px;}
.cal-sb h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:10px;font-family:'Noto Sans KR',sans-serif;}
.ev-item{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:var(--r-sm);margin-bottom:5px;border:1px solid var(--border);cursor:pointer;transition:.15s;}
.ev-item:hover{box-shadow:var(--sh-sm);}
.ev-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.ev-info h4{font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.ev-info p{font-size:11px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}
.ev-time{font-size:11px;color:var(--ink3);margin-left:auto;white-space:nowrap;padding-left:4px;font-family:'Noto Sans KR',sans-serif;}

/* STUDENTS */
.stu-toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.chip{padding:6px 13px;border-radius:50px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--white);transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.chip.on{background:var(--ink);color:var(--white);border-color:var(--ink);}
.stu-table{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;}
.stu-head{display:grid;grid-template-columns:1fr 150px 150px 50px;background:var(--cream);padding:11px 18px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);border-bottom:1px solid var(--border);font-family:'Noto Sans KR',sans-serif;}
.stu-row{display:grid;grid-template-columns:1fr 150px 150px 50px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;transition:.15s;}
.stu-row:last-child{border-bottom:none;}
.stu-row:hover{background:var(--cream);}
.stu-name{display:flex;align-items:center;gap:9px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--white);flex-shrink:0;font-family:'Noto Sans KR',sans-serif;}
.stu-nm{font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;}
.stu-memo{font-size:12px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.cbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.row-acts{display:flex;opacity:0;transition:.2s;}
.stu-row:hover .row-acts{opacity:1;}

/* JOURNAL */
.j-wrap{display:grid;grid-template-columns:1fr 250px;gap:22px;}
.j-list{display:flex;flex-direction:column;gap:12px;}
.j-card{background:var(--white);border-radius:var(--r-md);border:1px solid var(--border);padding:18px;cursor:pointer;transition:.2s;}
.j-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px);}
.j-top{display:flex;gap:13px;align-items:flex-start;}
.j-date{text-align:center;flex-shrink:0;min-width:40px;}
.j-day{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1;}
.j-mon{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}
.j-div{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
.j-body{flex:1;min-width:0;}
.j-body h4{font-size:14px;font-weight:600;margin-bottom:4px;font-family:'Noto Sans KR',sans-serif;}
.j-body p{font-size:13px;color:var(--ink2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:'Noto Sans KR',sans-serif;}
.j-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.j-tag{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;font-family:'Noto Sans KR',sans-serif;}
.j-sb{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px;}
.j-sb h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:10px;font-family:'Noto Sans KR',sans-serif;}
.mitem{display:flex;justify-content:space-between;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.15s;font-family:'Noto Sans KR',sans-serif;}
.mitem:hover{background:var(--cream);}
.mitem span:last-child{color:var(--ink3);font-size:11px;}

/* ACCOUNT */
.acc-wrap{display:grid;grid-template-columns:350px 1fr;gap:22px;max-width:860px;}
.acc-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:24px;margin-bottom:14px;}
.acc-card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:18px;font-family:'Noto Sans KR',sans-serif;}
.av-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px;}
.av-big{width:84px;height:84px;border-radius:50%;background:var(--peach);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--white);overflow:hidden;font-family:'Noto Sans KR',sans-serif;}
.av-big img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.av-upload{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1.5px solid var(--border);border-radius:50px;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink2);transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.av-upload:hover{border-color:var(--ink2);}
.av-upload svg{width:13px;stroke:currentColor;fill:none;stroke-width:2;}
.af{margin-bottom:13px;}
.af label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:5px;font-family:'Noto Sans KR',sans-serif;}
.af input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--ink);outline:none;background:var(--cream);transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.af input:focus{border-color:var(--ink2);background:var(--white);}
.af input:disabled{cursor:not-allowed;color:var(--ink3);}
.danger-zone{border-color:#fdd!important;}
.danger-zone h3{color:#e44!important;}

/* DOW */
.dow-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.dow-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--cream);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.dow-btn.on{background:var(--ink);color:var(--white);border-color:var(--ink);}
.time-row{display:flex;gap:7px;align-items:center;}
.time-row span{font-size:12px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;}
.time-row input{flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;outline:none;background:var(--cream);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.mo.on{display:flex;}
.mo-box{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.mo-head{padding:22px 26px 0;display:flex;align-items:center;justify-content:space-between;}
.mo-head h3{font-size:18px;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.mo-close{background:none;border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink3);}
.mo-close:hover{background:var(--cream);}
.mo-close svg{width:16px;stroke:currentColor;fill:none;stroke-width:2;}
.mo-body{padding:20px 26px 26px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:6px;font-family:'Noto Sans KR',sans-serif;}
.mf input,.mf textarea,.mf select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--ink);outline:none;background:var(--cream);transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--ink2);background:var(--white);}
.mf textarea{resize:none;min-height:100px;line-height:1.7;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;}
.cdot.on{border-color:var(--ink);transform:scale(1.1);}
.mo-foot{display:flex;gap:9px;margin-top:18px;}
.mo-foot .btn-p{flex:1;justify-content:center;}
.cls-chips{display:flex;flex-wrap:wrap;gap:6px;}
.cls-chip{padding:6px 12px;border-radius:50px;border:1.5px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--white);transition:.2s;font-family:'Noto Sans KR',sans-serif;}
.cls-chip.on{background:var(--ink);color:var(--white);border-color:var(--ink);}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--white);padding:10px 20px;border-radius:50px;font-size:13px;font-weight:500;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:900px){.cal-wrap,.j-wrap{grid-template-columns:1fr;}.acc-wrap{grid-template-columns:1fr;}.stu-head,.stu-row{grid-template-columns:1fr 120px 50px;}.stu-head>*:nth-child(2),.stu-row>*:nth-child(2){display:none;}}
@media(max-width:680px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.topbar,.pb{padding-left:16px;padding-right:16px;}.d-hero,.d-meta,.d-body{padding-left:16px;padding-right:16px;}.d-tabs{padding-left:8px;}.mob-btn{display:flex!important;}}
.mob-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;}
.mob-btn svg{width:20px;stroke:var(--ink);fill:none;stroke-width:2;}
.ov-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49;}
.ov-bg.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.ani{animation:fu .25s ease both;}
</style>
</head>

function uid() { return U ? U.uid : null; }
function dbRef(path) { return ref(db, 'users/' + uid() + '/' + path); }

async function dbSet(path, val) { await set(dbRef(path), val); }
async function dbUpdate(path, val) { await update(dbRef(path), val); }
async function dbRemove(path) { await remove(dbRef(path)); }
async function dbGet(path) {
  var snap = await get(dbRef(path));
  return snap.exists() ? snap.val() : null;
}

function listenData() {
  onValue(dbRef('classes'), function(snap) { D.classes = snap.val() || {}; if (curClass && document.getElementById('pg-detail').style.display !== 'none') renderDtab(); else if (document.getElementById('pg-classes').style.display !== 'none') renderClasses(); });
  onValue(dbRef('students'), function(snap) { D.students = snap.val() || {}; if (document.getElementById('pg-students').style.display !== 'none') renderStudents(); });
  onValue(dbRef('journals'), function(snap) { D.journals = snap.val() || {}; if (document.getElementById('pg-journal').style.display !== 'none') renderJournal(); if (document.getElementById('pg-calendar').style.display !== 'none') renderCal(); });
  onValue(dbRef('profile'), function(snap) { D.profile = snap.val() || {}; updateSidebar(); });
}

  btn.disabled = true; btn.textContent = '로그인 중...';
  signInWithEmailAndPassword(auth, email, pw)
    .catch(function(e) {
      btn.disabled = false; btn.textContent = '로그인';

function renderDtab() {

  if (curDtab === 'overview') {

        + '<button class="del-btn" onclick="delTodo(' + i + ')"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>';
    }).join('');

  } else if (curDtab === 'files') {
    var files = (c.files || []).map(function(f, i) {
      var isImg = f.dataUrl && f.type && f.type.indexOf('image') === 0;
      var preview = isImg ? '<img src="' + f.dataUrl + '" style="width:36px;height:36px;border-radius:9px;object-fit:cover">' : '<div class="file-icon">' + fEmoji(f.name) + '</div>';
      var dl = f.dataUrl ? '<a href="' + f.dataUrl + '" download="' + f.name + '" style="padding:5px 10px;border-radius:7px;font-size:11px;border:1.5px solid var(--border);color:var(--ink);background:var(--white);text-decoration:none;font-family:\'Noto Sans KR\',sans-serif">다운로드</a>' : '';
      return '<div class="file-row">' + preview + '<div class="file-info"><div class="fn">' + f.name + '</div><div class="fs">' + f.size + '</div></div>'
        + '<div style="display:flex;gap:5px;flex-shrink:0">' + dl + '<button onclick="delFile(' + i + ')" style="padding:5px 10px;border-radius:7px;font-size:11px;border:1.5px solid #fcc;color:#e44;background:transparent;cursor:pointer;font-family:\'Noto Sans KR\',sans-serif">삭제</button></div></div>';
    }).join('');
    body.innerHTML = '<label class="upload-zone" onclick="document.getElementById(\'file-input\').click()">'
      + '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'
      + '<p>클릭하거나 파일을 드래그해서 업로드</p><small>파일당 최대 4MB</small></label>'
      + (files || '<div style="text-align:center;padding:16px;color:var(--ink3);font-size:13px;font-family:\'Noto Sans KR\',sans-serif">첨부된 파일이 없어요</div>');
    var zone = body.querySelector('.upload-zone');
    if (zone) {
      zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.style.borderColor='var(--ink)'; });
      zone.addEventListener('dragleave', function() { zone.style.borderColor='var(--border)'; });
      zone.addEventListener('drop', function(e) { e.preventDefault(); zone.style.borderColor='var(--border)'; handleFileList(e.dataTransfer.files); });
    }
  } else if (curDtab === 'related') {
    var jrnls = jList().filter(function(j) { return (j.classIds||[]).indexOf(curClass) >= 0; }).sort(function(a,b) { return new Date(b.date)-new Date(a.date); });

window.toggleTodo = function(i) {

window.saveTodo = function() {
  var t = document.getElementById('mt-txt').value.trim(); if (!t) return;
  var c = D.classes[curClass]; if (!c) return;

  dbSet('classes/' + curClass + '/todos', todos).then(function() { closeMo('mo-todo'); document.getElementById('mt-txt').value=''; renderDtab(); toast('추가됐어요 ✓'); });

function fEmoji(name) {
  var ext = (name||'').split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp'].indexOf(ext)>=0) return '🖼️';
  if (ext==='pdf') return '📄'; if (['doc','docx'].indexOf(ext)>=0) return '📝';
  if (['xls','xlsx'].indexOf(ext)>=0) return '📊'; if (['ppt','pptx'].indexOf(ext)>=0) return '📋';
  return '📎';
}
window.handleFiles = function(input) { handleFileList(input.files); input.value=''; };
function handleFileList(fileList) {
  var MAX = 4*1024*1024;
  Array.from(fileList).forEach(function(file) {
    if (file.size>MAX) { toast(file.name+': 최대 4MB 초과'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var c = D.classes[curClass]; if (!c) return;
      var files = c.files || []; var kb = file.size/1024;
      files.push({name:file.name,size:kb>1024?(kb/1024).toFixed(1)+'MB':kb.toFixed(0)+'KB',type:file.type,dataUrl:e.target.result});
      dbSet('classes/'+curClass+'/files', files).then(function() { renderDtab(); toast(file.name+' 업로드됐어요 ✓'); });
    };
    reader.readAsDataURL(file);
  });
}
window.delFile = function(i) {
  if (!confirm('파일을 삭제할까요?')) return;
  var c = D.classes[curClass]; if (!c) return;
  var files = c.files||[]; files.splice(i,1);
  dbSet('classes/'+curClass+'/files', files).then(function() { renderDtab(); toast('삭제됐어요'); });
};

  var dows=c.dows||[];
  document.querySelectorAll('.dow-btn').forEach(function(b){b.classList.toggle('on',dows.indexOf(parseInt(b.dataset.d))>=0);});
  var times=parseTimes(c.schedule); document.getElementById('mc-ts').value=times.s; document.getElementById('mc-te').value=times.e;
  selColor=c.color; document.querySelectorAll('.cdot').forEach(function(d){d.classList.toggle('on',d.dataset.c===c.color);});

function parseTimes(sch) {
  if (!sch||sch.indexOf('|')<0) return {s:'',e:''};
  var p=sch.split('|')[1].trim().split('-'); return {s:(p[0]||'').trim(),e:(p[1]||'').trim()};
}
function getDows() { return Array.from(document.querySelectorAll('.dow-btn.on')).map(function(b){return parseInt(b.dataset.d);}); }
function buildSchedule(dows,ts,te) {
  if (!dows.length) return '';
  var days=dows.slice().sort(function(a,b){return a-b;}).map(function(d){return DL[d];}).join('/');
  return ts||te ? days+' | '+(ts||'')+(ts&&te?' - ':'')+(te||'') : days;
}
window.saveClass = function() {
  var name=document.getElementById('mc-name').value.trim(); if (!name){toast('수업 이름을 입력해주세요');return;}
  var id=document.getElementById('mc-id').value;
  var dows=getDows(); var ts=document.getElementById('mc-ts').value; var te=document.getElementById('mc-te').value;
  var newId=id||('c'+Date.now());

// ── CALENDAR ──
function getClsForDate(d) {
  var dow = d.getDay();
  var dateStr = d.toISOString().slice(0,10);
  return clsList().filter(function(c){
    // Check period type
    var ptype = c.periodType || "always";
    if(ptype === "dates"){
      // specific dates mode
      return (c.specificDates||[]).indexOf(dateStr) >= 0;
    }
    // Must match day of week first
    if(!c.dows || c.dows.indexOf(dow) < 0) return false;
    if(ptype === "range"){
      var start = c.dateStart, end = c.dateEnd;
      if(start && dateStr < start) return false;
      if(end   && dateStr > end)   return false;
    }
    // "always" = no restriction
    return true;
  });
}

  }).catch(function(e){
    msg.style.color="#e44";
    msg.textContent="전송 실패: 이메일 주소를 확인해주세요.";
  });
};

// ── PERIOD TAB ──
window.switchPeriodTab = function(tab){
  periodTab = tab;
  ["range","dates","always"].forEach(function(t){
    var el = document.getElementById("period-"+t);
    var btn = document.getElementById("pt-"+t);
    if(el) el.style.display = t===tab ? "block" : "none";
    if(btn){
      btn.style.background = t===tab ? "var(--ink)" : "var(--cream)";
      btn.style.color = t===tab ? "#fff" : "var(--ink2)";
    }
  });
};

window.addSpecificDate = function(){
  var d = document.getElementById("mc-single-date").value;
  if(!d) return;
  if(specificDates.indexOf(d) < 0){
    specificDates.push(d);
    specificDates.sort();
  }
  renderSpecificDates();
  document.getElementById("mc-single-date").value = "";
};

function renderSpecificDates(){
  var el = document.getElementById("mc-dates-list");
  if(!el) return;
  el.innerHTML = specificDates.map(function(d, i){
    return "<span style=\"display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--cream);border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-family:'Noto Sans KR',sans-serif;\">"
      + d
      + "<button type=\"button\" onclick=\"removeDate("+i+")\" style=\"background:none;border:none;cursor:pointer;color:var(--ink3);font-size:14px;line-height:1;padding:0 2px;\">×</button></span>";
  }).join("");
}

window.removeDate = function(i){
  specificDates.splice(i,1);
  renderSpecificDates();
};

// ── UPDATE openClassMo & editClassMo to handle period ──
var _origOpenClassMo = window.openClassMo;
window.openClassMo = function(){
  _origOpenClassMo();
  specificDates = [];
  document.getElementById("mc-date-start").value = "";
  document.getElementById("mc-date-end").value = "";
  renderSpecificDates();
  switchPeriodTab("range");
};

var _origEditClassMo = window.editClassMo;
window.editClassMo = function(id){
  _origEditClassMo(id);
  var c = D.classes[id]; if(!c) return;
  specificDates = (c.specificDates||[]).slice();
  document.getElementById("mc-date-start").value = c.dateStart||"";
  document.getElementById("mc-date-end").value = c.dateEnd||"";
  renderSpecificDates();
  var tab = c.periodType||"range";
  switchPeriodTab(tab);
};

// ── UPDATE saveClass to save period ──
var _origSaveClass = window.saveClass;
window.saveClass = function(){
  var name = document.getElementById("mc-name").value.trim();
  if(!name){toast("수업 이름을 입력해주세요");return;}
  var id = document.getElementById("mc-id").value;
  var dows = getDows();
  var ts = document.getElementById("mc-ts").value;
  var te = document.getElementById("mc-te").value;
  var newId = id||("c"+Date.now());
  var existing = id?D.classes[id]:{};
  var obj = Object.assign({},existing,{
    id:newId, name:name, schedule:buildSchedule(dows,ts,te),
    room:document.getElementById("mc-room").value.trim(),
    overview:document.getElementById("mc-ov").value.trim(),
    color:selColor, dows:dows,
    todos:existing.todos||[], files:existing.files||[], notes:existing.notes||"",
    periodType: periodTab,
    dateStart: periodTab==="range" ? document.getElementById("mc-date-start").value : "",
    dateEnd:   periodTab==="range" ? document.getElementById("mc-date-end").value : "",
    specificDates: periodTab==="dates" ? specificDates.slice() : []
  });
  dbSet("classes/"+newId, obj).then(function(){
    closeMo("mo-class"); renderClasses();
    toast(id?"수업이 수정됐어요 ✓":"수업이 추가됐어요 ✓");
  });
};

</script>
</body>
</html>
